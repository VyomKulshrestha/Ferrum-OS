name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build kernel + userland
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (clang/llvm-ar for heliox-daemon's C deps)
        # windows-latest ships an older LLVM pre-installed, which a plain
        # `choco install llvm` treats as "already installed" and silently
        # keeps - that older clang linked `ring`'s C sources (curve25519,
        # p256-nistz, sha2 asm variants) into an archive missing symbols
        # the Rust side still called, failing at link time. Forcing the
        # exact version this repo is actually built and verified against
        # locally removes that as a variable entirely.
        run: choco install llvm --version=22.1.7 -y --force --no-progress
        shell: pwsh

      - name: Show toolchain (rustup reads rust-toolchain.toml automatically)
        run: |
          rustup show
          rustc --version
          clang --version
        shell: pwsh

      - name: Generate mock model fixtures (userland/init embeds these via include_bytes!)
        run: node scripts/generate_mock_model.mjs
        shell: pwsh

      - name: Diagnostic - check registry ring cache for a stray .git dir
        # Working theory: the plain registry-fetched ring 0.17.14 fails to
        # link here (missing ASM-optimized symbols) but a vendored copy of
        # the identical source doesn't - ring's build.rs branches its whole
        # asm-source strategy on `fs::metadata(c_root_dir.join(".git")).is_ok()`,
        # and a path dependency (the vendor) can never have that, while a
        # pre-seeded/cached registry extraction on a hosted runner
        # conceivably could. Fetches ring into the registry cache without a
        # full build, then checks directly.
        run: |
          Push-Location userland\heliox-daemon
          cargo fetch --target x86_64-unknown-none
          Pop-Location
          $ringDir = Get-ChildItem -Path "$env:USERPROFILE\.cargo\registry\src" -Directory | ForEach-Object {
            Get-ChildItem -Path $_.FullName -Directory -Filter "ring-0.17.14*" -ErrorAction SilentlyContinue
          }
          foreach ($dir in $ringDir) {
            $gitPath = Join-Path $dir.FullName ".git"
            Write-Host "Checking $gitPath"
            if (Test-Path $gitPath) {
              Write-Host "##[warning] FOUND stray .git at $gitPath"
              Get-Item $gitPath -Force | Format-List *
            } else {
              Write-Host "No .git at $gitPath"
            }
          }
        shell: pwsh

      - name: Build
        # -vv on the *outer* build (not just the inner heliox-daemon one
        # build.rs itself spawns) is required for any of that inner build's
        # output to surface at all here: cargo only forwards build-script
        # stdout/stderr matching "cargo:warning=" unless the outer -vv is
        # set, and a nested `Command::new(cargo)` process spawned from
        # inside a build script inherits that same captured-and-filtered
        # stdio, so its own output is silently dropped otherwise too.
        run: cargo build -vv
        shell: pwsh
