# Build app-store for bare-metal x86_64. Same linking scheme as
# userland/init - see userland/init/.cargo/config.toml for the rationale.
[build]
target = "x86_64-unknown-none"
target-dir = "target"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "code-model=large",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=--image-base=0x8000000000",
]
