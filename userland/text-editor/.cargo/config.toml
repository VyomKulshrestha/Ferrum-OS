# Build text-editor for bare-metal x86_64. Same linking scheme as
# userland/init: non-PIE, linked directly at the dedicated user P4 slot
# (P4[1], base 0x80_0000_0000) via `--image-base`, large code model. See
# userland/init/.cargo/config.toml for the full rationale.
[build]
target = "x86_64-unknown-none"
target-dir = "target"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "code-model=large",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=--image-base=0x8000000000",
]
